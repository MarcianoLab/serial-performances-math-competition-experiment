<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta

      content="A laboratory-style arithmetic performance task for GitHub Pages and Qualtrics embedding."
    />
    <title>Arithmetic Performance Task</title>
